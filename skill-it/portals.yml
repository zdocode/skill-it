# skill-it Portals Configuration
# Updated 2026-04-13 — robust multi-selector scanning

title_filter:
  positive:
    - "AI Engineer"
    - "ML Engineer"
    - "LLM Engineer"
    - "Machine Learning"
    - "LLM"
    - "Agentic"
    - "LLMOps"
    - "Research Scientist"
    - "Applied Scientist"
    - "Deep Learning"
    - "Computer Vision"
    - "NLP"
    - "Natural Language"
    - "Generative AI"
    - "Safety"
    - "Alignment"
    - "Interpretability"
    - "Systems"
    - "Infrastructure"
    - "Engineer"
    - "Scientist"
  negative:
    - "Junior"
    - "Intern"
    - "Internship"
    - "Entry"
    - "Student"
  seniority_boost:
    - "Senior"
    - "Staff"
    - "Principal"
    - "Lead"

# Direct company scanning — multi-selector fallback
tracked_companies:
  - name: "Google"
    careers_url: "https://careers.google.com/jobs/results/"
    enabled: true
    selectors:
      - "div.Ln1EL"
      - "a[jsname='hSRGPd']"
      - "h3.QJPWVe"
      - "span.RP7SMd"
      - "span.r0wTof"

  - name: "OpenAI"
    careers_url: "https://openai.com/careers"
    enabled: false
    selectors:
      - "div[data-testid='job-card']"
      - "div.job-card"
      - "a[href*='/careers']"
      - "section[data-testid='job-card']"

  - name: "Anthropic"
    careers_url: "https://www.anthropic.com/jobs"
    enabled: false
    selectors:
      - "div[class*='Job']"
      - "a[href*='/jobs/']"
      - "[data-testid='job-card']"

  - name: "Meta"
